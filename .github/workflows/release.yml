name: Release QGS on tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release and upload proj.qgs
        uses: softprops/action-gh-release@v2
        with:
          files: proj.qgs