name: Release GPKG and QGS on tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PROJECT_FILE: proj.qgs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag points to current main
        run: |
          git fetch origin main --depth=1
          TAG_COMMIT="${GITHUB_SHA}"
          MAIN_COMMIT="$(git rev-parse origin/main)"
          echo "Tag commit:  ${TAG_COMMIT}"
          echo "Main commit: ${MAIN_COMMIT}"
          if [ "${TAG_COMMIT}" != "${MAIN_COMMIT}" ]; then
            echo "Refusing release: tag does not point to current origin/main." >&2
            exit 1
          fi

      - name: Validate required release files
        run: |
          test -f kart_repo.gpkg
          test -f "$PROJECT_FILE"

      - name: Build checksums manifest
        run: |
          mkdir -p release
          sha256sum kart_repo.gpkg "$PROJECT_FILE" > release/SHA256SUMS.txt

      - name: Build release bundle zip
        run: |
          zip -j release/haiz_release_bundle.zip kart_repo.gpkg "$PROJECT_FILE"

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/haiz_release_bundle.zip
            release/SHA256SUMS.txt
            kart_repo.gpkg
            ${{ env.PROJECT_FILE }}
